<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - BookStore</title>
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #0f3d2e 0%, #14523e 50%, #e8f3ee 100%); }
        .wrap { width: min(920px, 92vw); display: grid; grid-template-columns: 1fr 1fr; border-radius: 18px; overflow: hidden; background: #fff; box-shadow: 0 24px 55px rgba(0, 0, 0, 0.2); }
        .left { background: linear-gradient(180deg, #123f31, #1b6b52); color: white; padding: 2rem 1.6rem; }
        .left h1 { margin: 0; font-size: 2rem; }
        .left p { margin-top: 0.45rem; color: rgba(255,255,255,0.88); }
        .left ul { margin: 1.2rem 0 0; padding-left: 1rem; line-height: 1.8; }
        .right { padding: 2rem 1.5rem; }
        .card { border: 1px solid #e7ece9; border-radius: 14px; padding: 1.25rem; }
        .form-group { margin-bottom: 0.9rem; }
        label { display: block; margin-bottom: 0.3rem; font-weight: 600; color: #32453d; }
        input { width: 100%; border: 1px solid #d8e1dd; border-radius: 10px; padding: 0.72rem 0.8rem; }
        .btn { border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: #fff; background: linear-gradient(135deg, #14523e, #1f6a51); width: 100%; padding: 0.9rem; }
        .btn:hover { filter: brightness(1.05); }
        .alert { padding: 0.7rem 0.8rem; border-radius: 8px; margin-bottom: 0.8rem; display: none; }
        .alert-danger { background: #fde8e8; border: 1px solid #f5c7c7; color: #a61c1c; }
        .links { margin-top: 1rem; font-size: 0.92rem; color: #58635f; display: grid; gap: 0.35rem; }
        .links a { color: #14523e; font-weight: 700; text-decoration: none; }
        .mini { margin-top: 1rem; font-size: 0.84rem; color: #63716b; }
        .session-note { display:none; margin-bottom:0.8rem; border:1px solid #f0d5c0; background:#fff4ec; color:#8b2f0f; border-radius:8px; padding:0.7rem 0.8rem; }
        .session-note button { margin-top:0.45rem; border:1px solid #f0d5c0; background:#fff; color:#8b2f0f; border-radius:8px; padding:0.35rem 0.6rem; cursor:pointer; font-weight:700; }
        @media (max-width: 860px) { .wrap { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="wrap">
    <aside class="left">
        <h1>TD Bookstore</h1>
        <p>Staff Operation Portal</p>
        <ul>
            <li>Quản lý đơn hàng nội bộ</li>
            <li>Quản lý kho sách và tồn kho</li>
            <li>Chỉ cho role staff/warehouse/support</li>
        </ul>
    </aside>
    <main class="right">
        <div class="card">
            <h2 style="margin-top:0;">Đăng nhập Staff</h2>
            <div id="sessionNote" class="session-note"></div>
            <div id="errorAlert" class="alert alert-danger"></div>
            <form id="staffLoginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="staff@bookstore.com">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button id="submitBtn" type="submit" class="btn">Đăng nhập Staff</button>
            </form>
            <div class="links">
                <div>Manager? <a href="/manager/login/">Sang cổng Manager</a></div>
                <div>Customer? <a href="/login/">Đăng nhập mua sách</a></div>
            </div>
            <div class="mini">Test: staff@bookstore.com / staff123</div>
        </div>
    </main>
</div>

<script>
function clearInternalSession() {
    return fetch('/api/auth/staff/logout/', { method: 'POST', headers: { 'Content-Type': 'application/json' } })
        .catch(function () {})
        .finally(function () {
            localStorage.removeItem('staff_token');
            localStorage.removeItem('staff_id');
            localStorage.removeItem('staff_name');
            localStorage.removeItem('staff_role');
        });
}

fetch('/api/auth/staff/session/')
    .then(function (r) { return r.json(); })
    .then(function (s) {
        if (!s || !s.authenticated) {
            return;
        }
        var note = document.getElementById('sessionNote');
        var role = (s.role || '').toLowerCase();
        var name = s.name || 'Staff';
        note.style.display = 'block';
        note.innerHTML = 'Bạn đang đăng nhập với tài khoản ' + name + ' (' + role + ').<br>Chọn tiếp tục hoặc chuyển tài khoản.<br>' +
            '<button type="button" id="switchAccountBtn">Đăng nhập tài khoản khác</button>';
        document.getElementById('switchAccountBtn').addEventListener('click', function () {
            clearInternalSession();
            note.style.display = 'none';
        });
    })
    .catch(function () {
        // Keep login page usable even if session check temporarily fails.
    });

document.getElementById('staffLoginForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    var btn = document.getElementById('submitBtn');
    var alertEl = document.getElementById('errorAlert');
    btn.disabled = true;
    btn.textContent = 'Đang đăng nhập...';
    alertEl.style.display = 'none';

    fetch('/api/auth/staff/login/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: email, password: password})
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
        if (data.token && data.staff) {
            localStorage.setItem('staff_token', data.token);
            localStorage.setItem('staff_id', data.staff.staff_id);
            localStorage.setItem('staff_name', data.staff.first_name || 'Staff');
            localStorage.setItem('staff_role', data.staff.role || 'staff');
            window.location.href = '/staff/dashboard/';
            return;
        }
        alertEl.textContent = data.error || 'Đăng nhập thất bại';
        alertEl.style.display = 'block';
    })
    .catch(function () {
        alertEl.textContent = 'Lỗi kết nối server';
        alertEl.style.display = 'block';
    })
    .finally(function () {
        btn.disabled = false;
        btn.textContent = 'Đăng nhập Staff';
    });
});
</script>
</body>
</html>
