{% extends 'base.html' %}

{% block title %}Đăng ký - BookStore{% endblock %}

{% block content %}
<style>
    .auth-container {
        max-width: 440px;
        margin: 2rem auto;
    }
    .auth-card {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding: 2.5rem;
        border: 1px solid rgba(0,0,0,0.04);
    }
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-icon {
        width: 80px;
        height: 80px;
        background: var(--primary-light);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
        font-size: 2.5rem;
    }
    .auth-header h1 {
        margin: 0;
        font-size: 1.6rem;
    }
    .auth-header p {
        color: var(--gray);
        margin-top: 0.5rem;
        font-size: 0.95rem;
    }
    .auth-card .form-group input {
        padding: 0.85rem 1rem;
    }
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }
    .auth-card .btn {
        width: 100%;
        padding: 0.9rem;
        font-size: 1rem;
        border-radius: var(--radius-full);
    }
    .auth-divider {
        text-align: center;
        margin-top: 1.75rem;
        padding-top: 1.75rem;
        border-top: 1px solid var(--gray-light);
    }
    .auth-divider p {
        color: var(--gray);
        font-size: 0.9rem;
    }
    .auth-divider a {
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
    }
    .auth-divider a:hover { text-decoration: underline; }
</style>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">✨</div>
            <h1>Tạo tài khoản mới</h1>
            <p>Tham gia BookStore để khám phá thế giới sách</p>
        </div>
        
        <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
        <div id="successAlert" class="alert alert-success" style="display: none;"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">Họ</label>
                    <input type="text" id="first_name" name="first_name" required placeholder="Nguyễn">
                </div>
                <div class="form-group">
                    <label for="last_name">Tên</label>
                    <input type="text" id="last_name" name="last_name" required placeholder="Văn A">
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="Tối thiểu 6 ký tự">
            </div>
            <div class="form-group">
                <label for="phone">Số điện thoại (tùy chọn)</label>
                <input type="tel" id="phone" name="phone" placeholder="0912 345 678">
            </div>
            <button type="submit" class="btn">Đăng ký</button>
        </form>
        
        <div class="auth-divider">
            <p>
                Đã có tài khoản? <a href="/login/">Đăng nhập</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = this.querySelector('button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.innerHTML = '⏳ Đang đăng ký...';
    btn.disabled = true;

    const data = {
        first_name: document.getElementById('first_name').value,
        last_name: document.getElementById('last_name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        phone: document.getElementById('phone').value
    };
    
    fetch('/api/auth/register/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(result => {
        if (result.customer_id) {
            document.getElementById('successAlert').textContent = 'Đăng ký thành công! Đang chuyển hướng...';
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('errorAlert').style.display = 'none';
            setTimeout(() => window.location.href = '/login/', 2000);
        } else {
            document.getElementById('errorAlert').textContent = result.error || JSON.stringify(result);
            document.getElementById('errorAlert').style.display = 'block';
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    })
    .catch(err => {
        document.getElementById('errorAlert').textContent = 'Lỗi kết nối server';
        document.getElementById('errorAlert').style.display = 'block';
        btn.innerHTML = originalText;
        btn.disabled = false;
    });
});
</script>
{% endblock %}
