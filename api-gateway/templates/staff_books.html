{% extends 'base.html' %}

{% block title %}Manage Books - Staff{% endblock %}

{% block content %}
<div id="content" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h1>📚 Manage Books</h1>
        <div>
            <a href="/staff/dashboard/" class="btn">← Back to Dashboard</a>
            <button class="btn btn-success" onclick="showAddModal()">+ Add Book</button>
        </div>
    </div>
    
    <div class="card">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 2px solid #ddd;">
                    <th style="text-align: left; padding: 0.5rem;">Title</th>
                    <th style="text-align: left;">ISBN</th>
                    <th style="text-align: left;">Author</th>
                    <th style="text-align: right;">Price</th>
                    <th style="text-align: right;">Stock</th>
                    <th style="text-align: center;">Actions</th>
                </tr>
            </thead>
            <tbody id="booksTable">
                <tr><td colspan="6" style="text-align: center; padding: 1rem;">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Modal -->
<div id="bookModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000;">
    <div style="background: white; max-width: 500px; margin: 50px auto; padding: 2rem; border-radius: 8px;">
        <h2 id="modalTitle">Add New Book</h2>
        <form id="bookForm">
            <input type="hidden" id="bookId">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label>ISBN *</label>
                <input type="text" id="isbn" required>
            </div>
            <div class="form-group">
                <label>Author Name</label>
                <input type="text" id="author_name">
            </div>
            <div class="form-group">
                <label>Price *</label>
                <input type="number" id="price" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" id="stock_quantity" value="0">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="3"></textarea>
            </div>
            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-success">Save</button>
                <button type="button" class="btn" onclick="closeModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>

<div id="loginRequired" style="display: none; text-align: center; padding: 3rem;">
    <h2>🔒 Login Required</h2>
    <a href="/staff/login/" class="btn">Go to Staff Login</a>
</div>
{% endblock %}

{% block scripts %}
<script>
const staffToken = localStorage.getItem('staff_token');
if (!staffToken) {
    document.getElementById('loginRequired').style.display = 'block';
} else {
    document.getElementById('content').style.display = 'block';
    loadBooks();
}

function loadBooks() {
    fetch('/api/books/')
        .then(r => r.json())
        .then(books => {
            const tbody = document.getElementById('booksTable');
            if (!Array.isArray(books) || books.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No books found</td></tr>';
                return;
            }
            tbody.innerHTML = books.map(book => `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 0.5rem;">${book.title}</td>
                    <td>${book.isbn || '-'}</td>
                    <td>${book.author_name || '-'}</td>
                    <td style="text-align: right;">$${book.price}</td>
                    <td style="text-align: right;">${book.stock_quantity}</td>
                    <td style="text-align: center;">
                        <button class="btn" onclick="editBook('${book.book_id}')">Edit</button>
                        <button class="btn btn-danger" onclick="deleteBook('${book.book_id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        });
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = 'Add New Book';
    document.getElementById('bookForm').reset();
    document.getElementById('bookId').value = '';
    document.getElementById('bookModal').style.display = 'block';
}

function closeModal() {
    document.getElementById('bookModal').style.display = 'none';
}

function editBook(bookId) {
    fetch(`/api/books/${bookId}/`)
        .then(r => r.json())
        .then(book => {
            document.getElementById('modalTitle').textContent = 'Edit Book';
            document.getElementById('bookId').value = book.book_id;
            document.getElementById('title').value = book.title;
            document.getElementById('isbn').value = book.isbn || '';
            document.getElementById('author_name').value = book.author_name || '';
            document.getElementById('price').value = book.price;
            document.getElementById('stock_quantity').value = book.stock_quantity;
            document.getElementById('description').value = book.description || '';
            document.getElementById('bookModal').style.display = 'block';
        });
}

function deleteBook(bookId) {
    if (confirm('Are you sure you want to delete this book?')) {
        fetch(`/api/books/${bookId}/`, { method: 'DELETE' })
            .then(() => loadBooks());
    }
}

document.getElementById('bookForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const bookId = document.getElementById('bookId').value;
    const data = {
        title: document.getElementById('title').value,
        isbn: document.getElementById('isbn').value,
        author_name: document.getElementById('author_name').value,
        price: document.getElementById('price').value,
        stock_quantity: document.getElementById('stock_quantity').value,
        description: document.getElementById('description').value
    };
    
    const url = bookId ? `/api/books/${bookId}/` : '/api/books/';
    const method = bookId ? 'PUT' : 'POST';
    
    fetch(url, {
        method: method,
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(() => {
        closeModal();
        loadBooks();
    })
    .catch(err => alert('Error saving book'));
});
</script>
{% endblock %}
